[tools]
codex = "latest"
node = "26.1.0"
rust = "1.94.1"
"cargo:dioxus-cli" = "0.7.9"
"cargo:bacon" = "latest"

[tasks."dev:server"]
description = "Run the Local Control Plane with bacon hot-restart"
run = "bacon run"

[tasks."dev:dashboard"]
description = "Run the Dashboard Dioxus dev server"
run = "dx serve --open false --package agentic-afk-dashboard"

[tasks.dev]
description = "Run server and dashboard with hot reload in parallel"
depends = ["dev:server", "dev:dashboard"]

[tasks.check]
description = "Check the Rust workspace"
run = "cargo check --workspace --all-targets --locked"

[tasks.build]
description = "Build runnable workspace artifacts (server + dashboard)"
run = [
    "cargo build --workspace --locked",
    "dx build --release --package agentic-afk-dashboard --debug-symbols false --locked",
]

[tasks.test]
description = "Run automated tests"
depends = ["build"]
run = "cargo test --workspace --locked"

[tasks."api-docs"]
description = "Verify API documentation coverage"
run = "cargo test -p agentic-afk-control-plane-server openapi_document_describes_project_api_and_problem_responses --locked"

[tasks.e2e]
description = "Run Playwright Dashboard smoke tests"
depends = ["build"]
run = "npm run e2e"

[tasks.ci]
description = "Run the complete validation workflow"
depends = ["check", "test", "api-docs", "e2e"]
