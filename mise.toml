[tools]
codex = "latest"
node = "26.1.0"
rust = "1.94.1"
"cargo:dioxus-cli" = "0.7.9"

[tasks.dev]
description = "Run the Local Control Plane from source"
run = "cargo run -p agentic-afk-control-plane-server --bin agentic-afk -- serve"

[tasks."dashboard:dev"]
description = "Run the Dashboard Dioxus dev server"
run = "dx serve --open false --platform web --package agentic-afk-dashboard"

[tasks."dashboard:build"]
description = "Build the Dashboard web assets"
run = "rm -rf target/dx/agentic-afk-dashboard/release/web/public apps/dashboard/dist/assets && dx build --release --platform web --package agentic-afk-dashboard --debug-symbols false --locked && mkdir -p apps/dashboard/dist && cp -R target/dx/agentic-afk-dashboard/release/web/public/. apps/dashboard/dist/"

[tasks.check]
description = "Check the Rust workspace"
run = "cargo check --workspace --all-targets"

[tasks.test]
description = "Run automated tests"
run = "cargo test --workspace"

[tasks.build]
description = "Build runnable workspace artifacts"
run = "cargo build --workspace"

[tasks."api-docs"]
description = "Verify API documentation coverage"
run = "cargo test -p agentic-afk-control-plane-server openapi_document_describes_project_api_and_problem_responses"

[tasks."e2e:server"]
description = "Run the seeded Local Control Plane for Playwright"
run = "AGENTIC_AFK_BIND_ADDRESS=127.0.0.1:3637 AGENTIC_AFK_DATABASE_URL=sqlite://target/agentic-afk-playwright.db cargo run -p agentic-afk-control-plane-server --bin agentic-afk -- seed-dev && AGENTIC_AFK_BIND_ADDRESS=127.0.0.1:3637 AGENTIC_AFK_DATABASE_URL=sqlite://target/agentic-afk-playwright.db cargo run -p agentic-afk-control-plane-server --bin agentic-afk -- serve"

[tasks.e2e]
description = "Run Playwright Dashboard smoke tests"
depends = ["dashboard:build"]
run = "npm run e2e"

[tasks.ci]
description = "Run the complete validation workflow"
depends = ["check", "test", "api-docs", "e2e", "build"]
