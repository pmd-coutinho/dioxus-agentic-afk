name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  baseline:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Install only `rust` and `node` via mise; skip `cargo:dioxus-cli`,
      # `cargo:bacon`, and `codex` (slow source builds; not needed for CI:
      # bacon is dev-only, dioxus-cli is installed below via cargo-binstall,
      # and codex is never executed because Playwright mocks the assignment
      # routes — see playwright.config.ts AGENTIC_AFK_TEST_ENDPOINTS=1).
      - uses: jdx/mise-action@v2
        with:
          install_args: "rust node"
      - uses: cargo-bins/cargo-binstall@main
      - run: cargo binstall --no-confirm --locked dioxus-cli@0.7.9
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: mise run build
      - run: mise run ci
